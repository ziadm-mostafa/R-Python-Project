<nav class="bg-white border-b border-gray-200 px-4 lg:px-6 py-3 dark:bg-gray-800 dark:border-gray-700 sticky top-0 z-50">
    <div class="flex flex-wrap justify-between items-center mx-auto max-w-screen-xl">
        <a routerLink="/" class="flex items-center gap-2 group">
            <div class="bg-blue-600 p-1.5 rounded-lg group-hover:bg-blue-700 transition-colors">
              <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
              </svg>
            </div>
            <span class="self-center text-2xl font-bold whitespace-nowrap dark:text-white tracking-tight">Libre<span class="text-blue-600">Flow</span></span>
        </a>

        <div class="flex items-center lg:order-2">
            @if (authService.isLoggedIn()) {
                <div class="hidden sm:flex flex-col items-end mr-4 leading-tight">
                    <span class="text-sm font-semibold text-gray-900 dark:text-white">{{ authService.user()?.username }}</span>
                    <span class="text-xs text-gray-500 uppercase">{{ authService.user()?.role }}</span>
                </div>
                <button (click)="authService.logout()" class="text-white bg-red-600 hover:bg-red-700 focus:ring-4 focus:ring-red-300 font-medium rounded-lg text-sm px-4 py-2 dark:bg-red-500 dark:hover:bg-red-600 focus:outline-none transition-all shadow-sm">Logout</button>
            } @else {
                <a routerLink="/login" class="text-gray-700 dark:text-white hover:bg-gray-100 focus:ring-4 focus:ring-gray-300 font-medium rounded-lg text-sm px-4 py-2 mr-2 dark:hover:bg-gray-700 transition-all">Log in</a>
                <a routerLink="/register" class="text-white bg-blue-600 hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-4 py-2 dark:bg-blue-600 dark:hover:bg-blue-700 transition-all shadow-md">Get Started</a>
            }

            <button (click)="toggleMenu()" type="button" class="inline-flex items-center p-2 ml-1 text-sm text-gray-500 rounded-lg lg:hidden hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-gray-200 dark:text-gray-400 dark:hover:bg-gray-700 dark:focus:ring-gray-600">
                <span class="sr-only">Toggle menu</span>
                @if (!isMenuOpen()) {
                  <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
                  </svg>
                } @else {
                  <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                  </svg>
                }
            </button>
        </div>

        <div [ngClass]="{'hidden': !isMenuOpen(), 'flex': isMenuOpen()}" class="lg:flex justify-between items-center w-full lg:w-auto lg:order-1" id="mobile-menu-2">
            <ul class="flex flex-col mt-4 font-medium lg:flex-row lg:space-x-8 lg:mt-0 w-full lg:w-auto">
                <li>
                    <a (click)="isMenuOpen.set(false)" routerLink="/books" routerLinkActive="text-blue-600 bg-blue-50 lg:bg-transparent" class="block py-2 pr-4 pl-3 rounded lg:p-0 hover:text-blue-600 transition-colors" [routerLinkActiveOptions]="{exact: true}">Explore Books</a>
                </li>
                @if (authService.isLoggedIn()) {
                    <li>
                        <a (click)="isMenuOpen.set(false)" routerLink="/history" routerLinkActive="text-blue-600 bg-blue-50 lg:bg-transparent" class="block py-2 pr-4 pl-3 rounded lg:p-0 hover:text-blue-600 transition-colors">My Borrowings</a>
                    </li>
                }
                @if (authService.isAdmin()) {
                    <li>
                        <a (click)="isMenuOpen.set(false)" routerLink="/admin/books" routerLinkActive="text-blue-600 bg-blue-50 lg:bg-transparent" class="block py-2 pr-4 pl-3 rounded lg:p-0 hover:text-blue-600 transition-colors font-bold border-l-2 border-blue-600 pl-4 lg:pl-0 lg:border-none">Management</a>
                    </li>
                    <li>
                        <a (click)="isMenuOpen.set(false)" routerLink="/admin/dashboard" routerLinkActive="text-blue-600 bg-blue-50 lg:bg-transparent" class="block py-2 pr-4 pl-3 rounded lg:p-0 hover:text-blue-600 transition-colors">Dashboard</a>
                    </li>
                }
            </ul>
        </div>
    </div>
</nav>
